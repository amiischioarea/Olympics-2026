<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"> 
    <title>Milano Cortina 2026 - Athlete Management</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen">
        <div class="splash-content">
            <h1>Milano - Home of the Olympic Games</h1>
            <div class="loader"></div>
        </div>
    </div>

    <header>
        <h1>Milano Cortina 2026 - Athlete Management</h1>
    </header>

    <main>
        <section id="edit-section" style="display: none; background-color: #fff9eb; border: 2px solid #d69e2e; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
            <h2> Editing Athlete Profile</h2>
            <div class="horizontal-form">
                <input type="hidden" id="edit-athlete-id">
                <div class="input-group">
                    <label>New First Name:</label>
                    <input type="text" id="edit-fName">
                </div>
                <div class="input-group">
                    <label>New Last Name:</label>
                    <input type="text" id="edit-lName">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="btnSaveEdit" class="btn-primary" style="background-color: #28a745;">Save Changes</button>
                    <button id="btnCancelEdit" class="edit-btn">Cancel</button>
                </div>
            </div>
        </section>

        <section id="form-atlet">
            <h2>1. Register New Athlete</h2>
            <div class="horizontal-form">
                <div class="input-group">
                    <label for="fName">First Name:</label>
                    <input type="text" id="fName" placeholder="e.g. Ion">
                </div>
                <div class="input-group">
                    <label for="lName">Last Name:</label>
                    <input type="text" id="lName" placeholder="e.g. Barbu">
                </div>
                <div class="input-group">
                    <label for="countryId">Country:</label>
                    <select id="countryId"></select>
                </div>
                <div class="input-group">
                    <label for="sportId">Sport:</label>
                    <select id="sportId"></select>
                </div>
                <button id="btnAddAthlete" class="btn-primary">Register Athlete</button>
            </div>
        </section>

        <section id="form-medalie">
            <h2>2. Award Medal</h2>
            <div class="horizontal-form">
                <div class="input-group">
                    <label for="athleteIdInput">Athlete ID:</label>
                    <input type="number" id="athleteIdInput" placeholder="Enter ID">
                </div>
                <div class="input-group">
                    <label for="medalType">Medal Type:</label>
                    <select id="medalType">
                        <option value="Gold">Gold</option>
                        <option value="Silver">Silver</option>
                        <option value="Bronze">Bronze</option>
                    </select>
                </div>
                <button id="btnAwardMedal" class="btn-medal">Award Medal</button>
            </div>
        </section>

        <section id="lista-atleti">
            <h2>Active Athletes</h2>
            
            <div class="horizontal-form" style="margin-bottom: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 8px; border: 1px solid #ddd;">
                <div class="input-group">
                    <label>Search:</label>
                    <input type="text" id="searchInput" placeholder="Search by name...">
                </div>
                <div class="input-group">
                    <label>Filter by Sport:</label>
                    <select id="filterSport">
                        <option value="all">All Sports</option>
                    </select>
                </div>
                <button id="btnSearch" class="btn-primary" style="background-color: #007bff;">Search</button>
                <button id="btnResetSearch" class="edit-btn">View All / Reset</button>
            </div>

            <table id="athletesTable">
                <thead style="cursor: pointer; background-color: #f2f2f2;"></thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="lista-medalii">
            <h2>Live Medal Standings</h2>
            <table id="medalsTable">
                <thead>
                    <tr>
                        <th>Medal Type</th>
                        <th>Athlete Name</th>
                        <th>Sport</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

<script src="script.js"></script>
</body>
</html>
